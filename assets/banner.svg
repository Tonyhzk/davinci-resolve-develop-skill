<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Decorative film strip -->
  <g opacity="0.15">
    <rect x="50" y="20" width="30" height="20" rx="2" fill="#fff"/>
    <rect x="90" y="20" width="30" height="20" rx="2" fill="#fff"/>
    <rect x="130" y="20" width="30" height="20" rx="2" fill="#fff"/>
    <rect x="170" y="20" width="30" height="20" rx="2" fill="#fff"/>
    <rect x="50" y="260" width="30" height="20" rx="2" fill="#fff"/>
    <rect x="90" y="260" width="30" height="20" rx="2" fill="#fff"/>
    <rect x="130" y="260" width="30" height="20" rx="2" fill="#fff"/>
    <rect x="170" y="260" width="30" height="20" rx="2" fill="#fff"/>
  </g>

  <!-- DaVinci Resolve Icon (simplified) -->
  <g transform="translate(100, 90)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="url(#accent)" stroke-width="3" filter="url(#glow)"/>
    <polygon points="45,35 85,60 45,85" fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- AI Circuit Lines -->
  <g opacity="0.2" stroke="#e94560" stroke-width="1.5" fill="none">
    <path d="M280,150 L350,150 L380,120 L450,120"/>
    <path d="M280,150 L350,150 L380,180 L450,180"/>
    <circle cx="280" cy="150" r="4" fill="#e94560"/>
    <circle cx="450" cy="120" r="4" fill="#e94560"/>
    <circle cx="450" cy="180" r="4" fill="#e94560"/>
  </g>

  <!-- Title -->
  <text x="500" y="120" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" filter="url(#glow)">
    DaVinci Resolve
  </text>
  <text x="500" y="170" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="url(#accent)" filter="url(#glow)">
    Develop Skill
  </text>

  <!-- Subtitle -->
  <text x="500" y="210" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="18" fill="#8892b0" font-weight="400">
    AI-Powered Skill for DaVinci Resolve Development
  </text>
  <text x="500" y="240" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="16" fill="#8892b0" font-weight="400">
    为 AI 大模型打造的达芬奇开发技能
  </text>

  <!-- Version badge -->
  <g transform="translate(1050, 30)">
    <rect width="100" height="28" rx="14" fill="url(#accent)" opacity="0.9"/>
    <text x="50" y="19" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">v1.0.0</text>
  </g>
</svg>
